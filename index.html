<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Mensive Ryushalie! 💜</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* Gradasi Ungu ke Pink yang Lembut */
            background: linear-gradient(135deg, #d8b4fe, #fbcfe8);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            color: #4c1d95; /* Warna teks ungu tua */
        }

        .card {
            background: rgba(255, 255, 255, 0.85);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(10px);
            border: 2px solid #c084fc; /* Bingkai ungu muda */
            z-index: 10;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #7c3aed; /* Warna judul ungu cerah */
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .heart-icon {
            font-size: 50px;
            color: #db2777; /* Warna pink tua */
            animation: pulse 1.2s infinite;
            margin: 15px 0;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        p {
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .signature {
            font-style: italic;
            font-weight: bold;
            color: #db2777;
            margin-top: 15px;
            font-size: 1.1rem;
        }

        /* Container untuk efek berjatuhan */
        .falling-elements {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .element-drop {
            position: absolute;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

    <div class="falling-elements" id="dropContainer"></div>

    <div class="card">
        <h1>Happy 2nd Mensiversary! 🎉</h1>
        <div class="heart-icon">💜</div>
        
        <p>
            "Hi Ryu sayang, my love, my universe, my everything! Happy mensive yang kedua sayang. Terimakasih ya udah mau nemenin aku selama ini, aku sayang kamu kemarin, hari ini, besok, lusa dan seterusnya."
        </p>

        <div class="signature">With love, Sanford 🌸</div>
    </div>

    <script>
        const container = document.getElementById('dropContainer');
        // Isinya emoji hati, bunga lily, dan bintang-bintang estetik
        const items = ['💜', '💖', '🤍', '🌸', '✨', '💕', '⚜️']; 

        function createFallingItem() {
            const item = document.createElement('div');
            item.classList.add('element-drop');
            item.innerText = items[Math.floor(Math.random() * items.length)];
            item.style.left = Math.random() * 100 + 'vw';
            item.style.animationDuration = Math.random() * 3 + 3 + 's'; // Kecepatan jatuh (3-6 detik)
            item.style.fontSize = Math.random() * 15 + 15 + 'px'; // Ukuran random
            
            container.appendChild(item);

            // Hapus element setelah animasi selesai agar web tetap lancar
            setTimeout(() => {
                item.remove();
            }, 6000);
        }

        // Munculkan element baru setiap 350 milidetik
        setInterval(createFallingItem, 350);
    </script>
</body>
</html>
